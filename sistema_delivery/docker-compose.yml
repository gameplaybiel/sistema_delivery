services:
  rabbitmq_2:
    image: rabbitmq:3-management
    container_name: rabbitmq_2
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASSWORD: guest

  postgres:
    image: postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: example

  cliente1:
    image: adminer
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      rabbitmq_2:
        condition: service_started
      postgres:
        condition: service_started

  cliente2:
    image: adminer
    restart: always
    ports:
      - "8086:8080"
    depends_on:
      rabbitmq_2:
        condition: service_started
      postgres:
        condition: service_started

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "8087:80"
    volumes:
      - /c/Users/gabri/Downloads/sistema_delivery[1]/sistema_delivery/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - cliente1
      - cliente2